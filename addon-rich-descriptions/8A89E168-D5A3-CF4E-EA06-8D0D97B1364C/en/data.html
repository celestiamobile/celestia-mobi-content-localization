<p>The <strong>Solar and Heliospheric Observatory (SOHO)</strong> is a NASA/ESA spacecraft that is constantly observing the activity of the <a href="celaddon://item?item=B3BA3028-88BE-434F-B40E-3B741741D9FE">Sun</a> since 1996. In addition, due to its unique perspective of the Sun, it has also discovered more than 5,000 comets so far. Its mission is currently extended until 2029</p>
